<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Калькулятор сна</title>
<style>
body{
background:#000;
color:#fff;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
max-width:700px;
margin:auto;
padding:20px;
}
.card{
background:#111;
border:1px solid #333;
border-radius:20px;
padding:20px;
}
h1{
text-align:center;
margin-bottom:20px;
}
.now{
font-size:20px;
text-align:center;
margin-bottom:20px;
color:#ccc;
}
input{
width:100%;
padding:14px;
margin-top:10px;
font-size:18px;
border-radius:12px;
border:1px solid #444;
background:#1c1c1e;
color:white;
box-sizing:border-box;
}
button{
width:100%;
padding:16px;
margin-top:15px;
font-size:20px;
font-weight:bold;
background:#2563eb;
color:white;
border:none;
border-radius:12px;
cursor:pointer;
}
.result{
margin-top:25px;
padding:20px;
background:#1c1c1e;
border-radius:16px;
text-align:center;
}
.result-time{
font-size:52px;
font-weight:bold;
}
.result-date{
margin-top:10px;
font-size:18px;
color:#aaa;
}
.history{
margin-top:30px;
}
.history h2{
margin-bottom:15px;
}
.history-item{
background:#1c1c1e;
border-radius:12px;
padding:12px;
margin-bottom:10px;
font-size:15px;
line-height:1.5;
}
.label{
margin-top:15px;
font-size:14px;
color:#aaa;
}
</style>
</head>
<body>
<div class="card">
<h1>⏰ Калькулятор времени</h1>
<div class="now">
Текущее время: <span id="live"></span>
</div>
<div class="label">Время начала</div>
<input type="datetime-local" id="startTime">
<div class="label">Добавить часов</div>
<input type="number" id="hours" value="8">
<div class="label">Добавить минут</div>
<input type="number" id="minutes" value="0">

+8 часов

Рассчитать

<div class="result">
<div class="result-time" id="resultTime">--:--</div>
<div class="result-date" id="resultDate"></div>
</div>
<div class="history">
<h2>Последние 10 расчетов</h2>
<div id="historyList"></div>
</div>
</div>
<script>
function updateClock(){
const now=new Date();
document.getElementById("live").textContent=
now.toLocaleString("ru-RU");
if(!document.getElementById("startTime").value){
const year=now.getFullYear();
const month=String(now.getMonth()+1).padStart(2,"0");
const day=String(now.getDate()).padStart(2,"0");
const hour=String(now.getHours()).padStart(2,"0");
const minute=String(now.getMinutes()).padStart(2,"0");
document.getElementById("startTime").value=
`${year}-${month}-${day}T${hour}:${minute}`;
}
}
setInterval(updateClock,1000);
updateClock();
function addEight(){
const input=document.getElementById("hours");
input.value=parseInt(input.value || 0)+8;
}
function calculate(){
const start=document.getElementById("startTime").value;
if(!start){
return;
}
const hours=
parseInt(document.getElementById("hours").value || 0);
const minutes=
parseInt(document.getElementById("minutes").value || 0);
const startDate=new Date(start);
const resultDate=new Date(startDate);
resultDate.setHours(
resultDate.getHours()+hours
);
resultDate.setMinutes(
resultDate.getMinutes()+minutes
);
document.getElementById("resultTime").textContent=
resultDate.toLocaleTimeString(
"ru-RU",
{
hour:"2-digit",
minute:"2-digit"
}
);
document.getElementById("resultDate").textContent=
resultDate.toLocaleString("ru-RU");
saveHistory(
startDate,
hours,
minutes,
resultDate
);
}
function saveHistory(start,hours,minutes,result){
let history=
JSON.parse(
localStorage.getItem("timeHistory")
|| "[]"
);
history.unshift({
start:start.toLocaleString("ru-RU"),
hours:hours,
minutes:minutes,
result:result.toLocaleString("ru-RU")
});
history=history.slice(0,10);
localStorage.setItem(
"timeHistory",
JSON.stringify(history)
);
renderHistory();
}
function renderHistory(){
const history=
JSON.parse(
localStorage.getItem("timeHistory")
|| "[]"
);
const container=
document.getElementById("historyList");
container.innerHTML="";
history.forEach(item=>{
const div=
document.createElement("div");
div.className="history-item";
div.innerHTML=
`
<b>Начало:</b><br>
${item.start}<br><br>
<b>Добавлено:</b><br>
${item.hours} ч ${item.minutes} мин<br><br>
<b>Результат:</b><br>
${item.result}
`;
container.appendChild(div);
});
}
renderHistory();
</script>
</body>
</html>
