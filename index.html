<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Калькулятор времени</title>
<style>
body{
background:#000;
color:#fff;
font-family:-apple-system,sans-serif;
padding:20px;
max-width:500px;
margin:auto;
}
.box{
background:#111;
padding:20px;
border-radius:20px;
}
input{
width:100%;
padding:15px;
font-size:20px;
margin:10px 0;
background:#1c1c1e;
border:1px solid #333;
border-radius:12px;
color:white;
}
.result{
margin-top:20px;
font-size:60px;
text-align:center;
font-weight:bold;
}
.quick{
display:flex;
gap:10px;
margin-top:10px;
}
button{
flex:1;
padding:15px;
font-size:18px;
background:#2c2c2e;
color:white;
border:none;
border-radius:12px;
}
</style>
</head>
<body>
<div class="box">
<h2>⏰ Калькулятор времени</h2>
<p>Текущее время: <span id="now"></span></p>
<input type="time" id="time">
<div class="quick">
<button onclick="add(8)">+8ч</button>
<button onclick="add(12)">+12ч</button>
<button onclick="add(24)">+24ч</button>
</div>
<div class="result" id="result">--:--</div>
</div>
<script>
function pad(n){
return String(n).padStart(2,"0");
}
function updateClock(){
let d=new Date();
let h=d.getHours();
let m=d.getMinutes();
document.getElementById("now").innerText=
pad(h)+":"+pad(m);
if(!document.getElementById("time").value){
document.getElementById("time").value=
pad(h)+":"+pad(m);
}
}
setInterval(updateClock,1000);
updateClock();
function add(hours){
let value=document.getElementById("time").value;
if(!value) return;
let parts=value.split(":");
let h=parseInt(parts[0]);
let m=parseInt(parts[1]);
let total=h*60+m+hours*60;
let rh=Math.floor((total%(24*60))/60);
let rm=total%60;
document.getElementById("result").innerText=
pad(rh)+":"+pad(rm);
}
</script>
</body>
</html>
